<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SIP Caller</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#111;color:#eee;padding:20px;max-width:480px;margin:auto}
h1{font-size:1.3rem;margin-bottom:16px;color:#0af}
.card{background:#1a1a2e;border-radius:12px;padding:16px;margin-bottom:16px}
label{display:block;font-size:.8rem;color:#888;margin:10px 0 4px}
input{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#222;color:#eee;font-size:1rem}
button{padding:12px 24px;border-radius:8px;border:none;font-size:1rem;cursor:pointer;font-weight:600;margin:4px}
.btn-primary{background:#0a4;color:#fff;width:100%}
.btn-primary:disabled{background:#333;color:#666}
.btn-danger{background:#c33;color:#fff}
.btn-danger:disabled{background:#333;color:#666}
#s{background:#0a0a1a;border-radius:8px;padding:12px;font-size:.8rem;font-family:monospace;max-height:200px;overflow-y:auto;white-space:pre-wrap;color:#0f0}
.e{color:#f44}.i{color:#4af}.s{color:#0a4}
</style>
</head>
<body>
<h1>☎ SIP Caller</h1>
<div class="card">
  <label>Usuario SIP</label>
  <input id="su" value="wes5169805709">
  <label>Password</label>
  <input id="sp" type="password" value="138e587867f90ba6c5c5fb9c16b73cc3">
  <label>Dominio</label>
  <input id="sd" value="webdial.keepcalling.net">
  <label>Número a llamar</label>
  <input id="dn" placeholder="Ej: 576028998200">
  <div style="margin-top:10px">
    <button class="btn-primary" id="bc" onclick="call()">📞 Llamar</button>
    <button class="btn-danger" id="bh" onclick="hangup()" disabled>Colgar</button>
  </div>
</div>
<div class="card"><div id="s">Listo</div></div>

<script>
let ws = null, callActive = false, connected = false;
let audioCtx = null, micStream = null, micProc = null, outNode = null, playQ = [];

function l(m,c){const e=document.getElementById('s');e.innerHTML+='<span class="'+(c||'i')+'">› </span>'+m+'\n';e.scrollTop=e.scrollHeight}
function g(i){return document.getElementById(i).value.trim()}
function r(){return Math.random().toString(16).slice(2)}

function logHeaders(h){
  if(!h)return'';
  let s='';
  if(h.to)s+='\n  To: '+h.to;
  if(h.from)s+='\n  From: '+h.from;
  if(h['call-id'])s+='\n  Call-ID: '+h['call-id'];
  if(h.cseq)s+='\n  CSeq: '+h.cseq;
  if(h.contact)s+='\n  Contact: '+h.contact;
  return s;
}

function parseSdpAddr(sdp){
  let ip=null,port=null;
  for(const ln of sdp.split('\r\n')){
    if(ln.startsWith('c=IN IP4 '))ip=ln.slice(9);
    else if(ln.startsWith('m=audio ')){const p=ln.split(' ');port=parseInt(p[1],10)}
  }
  return ip&&port?{ip,port}:null;
}

function startAudioRelay(rtpIp,rtpPort){
  ws.send(JSON.stringify({type:'start',rtpIp,rtpPort}));
  startMic();
  l('Iniciando relay audio...');
}

function stopAudioRelay(){
  if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'stop'}));
  stopMic();
}

function startMic(){
  if(!audioCtx)audioCtx=new AudioContext();
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}})
    .then(s=>{
      micStream=s;
      const src=audioCtx.createMediaStreamSource(s);
      micProc=audioCtx.createScriptProcessor(4096,1,1);
      micProc.onaudioprocess=(e)=>{
        const inp=e.inputBuffer.getChannelData(0);
        const pcm=new Int16Array(inp.length);
        for(let i=0;i<inp.length;i++){
          let v=Math.round(inp[i]*32768);
          if(v>32767)v=32767;else if(v<-32768)v=-32768;
          pcm[i]=v;
        }
        if(ws&&ws.readyState===WebSocket.OPEN)ws.send(pcm.buffer);
      };
      src.connect(micProc);
      micProc.connect(audioCtx.destination);
      l('Micrófono activado','s');
    }).catch(e=>l('Mic error: '+e.message,'e'));
}

function stopMic(){
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null}
  if(micProc){try{micProc.disconnect()}catch(e){}micProc=null}
}

function playPcm(buf){
  if(!audioCtx)audioCtx=new AudioContext();
  if(!outNode){
    outNode=audioCtx.createScriptProcessor(4096,0,1);
    outNode.onaudioprocess=(e)=>{
      const out=e.outputBuffer.getChannelData(0);
      const len=out.length;
      if(playQ.length>0){
        let copied=0;
        while(copied<len&&playQ.length>0){
          const ch=playQ[0],need=len-copied;
          if(ch.length<=need){for(let i=0;i<ch.length;i++)out[copied+i]=ch[i];copied+=ch.length;playQ.shift()}
          else{for(let i=0;i<need;i++)out[copied+i]=ch[i];playQ[0]=ch.subarray(need);copied=len}
        }
        for(let i=copied;i<len;i++)out[i]=0;
      }else{for(let i=0;i<len;i++)out[i]=0}
    };
    outNode.connect(audioCtx.destination);
  }
  const s=new Int16Array(buf),f=new Float32Array(s.length);
  for(let i=0;i<s.length;i++)f[i]=s[i]/32768;
  playQ.push(f);
}

async function call(){
  if(callActive){l('Ya hay llamada','e');return}
  const user=g('su'),pass=g('sp'),domain=g('sd'),num=g('dn');
  if(!num){l('Ingresa número','e');return}
  l('Llamando a '+num+'...');
  if(!ws||ws.readyState!==WebSocket.OPEN){
    l('Conectando...');
    ws=new WebSocket('wss://'+location.host);
    ws.binaryType='arraybuffer';
    ws.onopen=()=>{
      l('WS conectado ✓','s');connected=true;
      // Test with ping first
      ws.send(JSON.stringify({action:'ping'}));
      setTimeout(()=>doCall(user,pass,domain,num),500);
    };
    ws.onmessage=(ev)=>{
      if(typeof ev.data==='string')handleMsg(ev.data);
      else playPcm(ev.data);
    };
    ws.onclose=()=>{l('WS desconectado','e');connected=false;cleanup()};
    ws.onerror=()=>l('Error WS','e');
  }else{
    doCall(user,pass,domain,num);
  }
}

function doCall(user,pass,domain,num){
  callActive=true;
  document.getElementById('bc').disabled=true;
  ws.send(JSON.stringify({
    action:'sip_call',user,password:pass,domain,number:num
  }));
}

function handleMsg(raw){
  try{
    const m=JSON.parse(raw);
    if(m.type==='relay_ready'){l('Relay listo (puerto '+m.localPort+')','s');return}
    if(m.type==='debug'){l(m.msg);return}
    if(m.type==='sip_response'&&m.status===407){
      // First response without auth - server handles it internally
      l('Autenticando...');
      return;
    }
    if(m.type==='call_connected'){
      l('Conectado! | SDP:'+m.sdp.slice(0,40)+'...','s');
      l('Headers:'+logHeaders(m.headers));
      const addr=parseSdpAddr(m.sdp);
      if(addr){
        l('RTP destino: '+addr.ip+':'+addr.port);
        startAudioRelay(addr.ip,addr.port);
      }else{
        l('No se encontró RTP en SDP','e');
        l('SDP:'+m.sdp);
      }
      document.getElementById('bh').disabled=false;
      return;
    }
    if(m.type==='call_error'){
      l('Error: '+m.status+' '+m.reason,'e');
      cleanup();
    }
    if(m.type==='pong'){l('ping ok','s')}
  }catch(e){l('Parse error:'+e.message,'e')}
}

function hangup(){
  l('Colgando...');
  cleanup();
}

function cleanup(){
  callActive=false;
  stopAudioRelay();
  document.getElementById('bc').disabled=false;
  document.getElementById('bh').disabled=true;
}

l('Página cargada','i');
</script>
</body>
</html>
