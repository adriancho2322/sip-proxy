<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIP Caller</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #111; color: #eee; padding: 20px; max-width: 480px; margin: auto; }
h1 { font-size: 1.3rem; margin-bottom: 16px; color: #0af; }
.card { background: #1a1a2e; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
label { display: block; font-size: 0.8rem; color: #888; margin: 10px 0 4px; }
input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #222; color: #eee; font-size: 1rem; }
button { padding: 12px 24px; border-radius: 8px; border: none; font-size: 1rem; cursor: pointer; font-weight: 600; margin: 4px; }
.btn-call { background: #0a4; color: #fff; width: 100%; }
.btn-call:disabled { background: #333; color: #666; }
.btn-hangup { background: #c33; color: #fff; }
.btn-hangup:disabled { background: #333; color: #666; }
#status { background: #0a0a1a; border-radius: 8px; padding: 12px; font-size: 0.8rem; font-family: monospace; max-height: 200px; overflow-y: auto; white-space: pre-wrap; color: #0f0; }
#callerId { color: #ffa; font-size: 1rem; margin: 8px 0; }
.error { color: #f44; }
.info { color: #4af; }
.success { color: #0a4; }
</style>
</head>
<body>

<h1>☎ SIP Caller</h1>

<div class="card">
  <label>WS Proxy</label>
  <input id="wsUrl" value="wss://sip-proxy.onrender.com/ws">

  <label>Usuario SIP</label>
  <input id="sipUser" value="wes5169805709">

  <label>Password SIP</label>
  <input id="sipPass" type="password" value="138e587867f90ba6c5c5fb9c16b73cc3">

  <label>Dominio SIP</label>
  <input id="sipDomain" value="webdial.keepcalling.net">

  <button class="btn-call" id="btnConnect" onclick="connect()">Conectar</button>
</div>

<div class="card" id="callCard" style="display:none">
  <label>Número a llamar</label>
  <input id="destNum" placeholder="Ej: 576028998200">
  <div style="margin-top: 10px;">
    <button class="btn-call" id="btnCall" onclick="makeCall()">📞 Llamar</button>
    <button class="btn-hangup" id="btnHangup" onclick="hangup()" disabled>Colgar</button>
  </div>
  <div id="callerId"></div>
</div>

<div class="card">
  <div id="status">Listo</div>
</div>

<script>
// ---- Estado ----
let ws = null;
let pc = null;
let localStream = null;
let registered = false;
let callActive = false;
let currentCallId = null;
let currentFromTag = null;
let dialog = {};

function log(msg, type) {
  const el = document.getElementById('status');
  const cls = type || 'info';
  el.innerHTML += '<span class="' + cls + '">› </span>' + msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function getVal(id) { return document.getElementById(id).value.trim(); }

// ---- Util ----
function makeBranch() {
  return 'z9hG4bK' + Math.random().toString(16).slice(2, 14);
}

function makeTag() {
  return Math.random().toString(16).slice(2, 14);
}

function makeCallId() {
  return Math.random().toString(16).slice(2, 18) + '@browser';
}

function parseSipResponse(msg) {
  const lines = msg.split('\r\n');
  const statusLine = lines[0];
  const sp1 = statusLine.indexOf(' ');
  const sp2 = statusLine.lastIndexOf(' ');
  const version = statusLine.slice(0, sp1);
  const status = parseInt(statusLine.slice(sp1 + 1, sp2), 10);
  const reason = statusLine.slice(sp2 + 1);
  const headers = {};
  let i = 1;
  while (i < lines.length && lines[i] !== '') {
    const hdr = lines[i];
    const colon = hdr.indexOf(':');
    if (colon !== -1) {
      const name = hdr.slice(0, colon).toLowerCase();
      const value = hdr.slice(colon + 1).trim();
      if (headers[name]) {
        if (!Array.isArray(headers[name])) headers[name] = [headers[name]];
        headers[name].push(value);
      } else {
        headers[name] = value;
      }
    }
    i++;
  }
  const bodyStart = msg.indexOf('\r\n\r\n') + 4;
  const body = bodyStart < msg.length ? msg.slice(bodyStart) : '';
  return { version, status, reason, headers, body };
}

function createSipMessage(method, uri, headers, body) {
  let msg = method + ' ' + uri + ' SIP/2.0\r\n';
  for (const [name, value] of Object.entries(headers)) {
    if (Array.isArray(value)) {
      for (const v of value) msg += name + ': ' + v + '\r\n';
    } else {
      msg += name + ': ' + value + '\r\n';
    }
  }
  if (body) {
    const enc = new TextEncoder();
    msg += 'Content-Length: ' + enc.encode(body).length + '\r\n';
  } else {
    msg += 'Content-Length: 0\r\n';
  }
  msg += '\r\n';
  if (body) msg += body;
  return msg;
}

// ---- Digest MD5 ----
function digestResponse(method, uri, user, realm, pass, nonce) {
  const ha1 = md5(user + ':' + realm + ':' + pass);
  const ha2 = md5(method + ':' + uri);
  return md5(ha1 + ':' + nonce + ':' + ha2);
}

function parseAuthHeader(value) {
  const obj = {};
  if (!value) return obj;
  const parts = value.split(/[,\s]+/);
  for (const part of parts) {
    const eq = part.indexOf('=');
    if (eq === -1) continue;
    const key = part.slice(0, eq).trim().toLowerCase();
    let val = part.slice(eq + 1).trim();
    if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
    obj[key] = val;
  }
  return obj;
}

// ---- SIP functions ----
function sendSip(msg) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    log('WebSocket no conectado', 'error');
    return false;
  }
  ws.send(msg);
  const firstLine = msg.split('\r\n')[0];
  log('→ ' + firstLine);
  return true;
}

function doRegister() {
  const user = getVal('sipUser');
  const domain = getVal('sipDomain');
  const from = 'sip:' + user + '@' + domain;
  const callId = makeCallId();
  const branch = makeBranch();
  const tag = makeTag();

  const headers = {
    'Via': 'SIP/2.0/TCP 0.0.0.0;branch=' + branch + ';rport',
    'From': '<' + from + '>;tag=' + tag,
    'To': '<' + from + '>',
    'Call-ID': callId,
    'CSeq': '1 REGISTER',
    'Contact': '<' + from + '>',
    'Max-Forwards': '70',
  };

  currentCallId = callId;
  currentFromTag = tag;
  dialog.regCallId = callId;
  dialog.regFromTag = tag;
  dialog.regCseq = 1;

  sendSip(createSipMessage('REGISTER', 'sip:' + domain, headers));
  return callId;
}

function doAuthRegister(authHeader) {
  const user = getVal('sipUser');
  const pass = getVal('sipPass');
  const domain = getVal('sipDomain');
  const from = 'sip:' + user + '@' + domain;
  const challenge = parseAuthHeader(authHeader);
  const realm = challenge.realm || domain;
  const nonce = challenge.nonce || '';
  const callId = dialog.regCallId || makeCallId();
  const branch = makeBranch();
  const tag = dialog.regFromTag || makeTag();
  const cseq = (dialog.regCseq || 1) + 1;
  dialog.regCseq = cseq;

  const resp = digestResponse('REGISTER', 'sip:' + domain, user, realm, pass, nonce);

  const headers = {
    'Via': 'SIP/2.0/TCP 0.0.0.0;branch=' + branch + ';rport',
    'From': '<' + from + '>;tag=' + tag,
    'To': '<' + from + '>',
    'Call-ID': callId,
    'CSeq': cseq + ' REGISTER',
    'Contact': '<' + from + '>',
    'Max-Forwards': '70',
    'Proxy-Authorization': 'Digest username="' + user + '", realm="' + realm + '", nonce="' + nonce + '", uri="sip:' + domain + '", response="' + resp + '"',
  };

  sendSip(createSipMessage('REGISTER', 'sip:' + domain, headers));
}

function handleSipResponse(raw) {
  const msg = parseSipResponse(raw);
  log('← ' + msg.status + ' ' + msg.reason);

  // --- REGISTER responses ---
  if (msg.status === 407 && !registered) {
    const authHdr = msg.headers['proxy-authenticate'];
    if (authHdr) {
      log('Autenticando registro...');
      doAuthRegister(authHdr);
    } else {
      log('No Proxy-Authenticate header', 'error');
      registered = true; // intentar de todas formas
      document.getElementById('callCard').style.display = 'block';
      document.getElementById('btnConnect').textContent = '🔄 Reconectar';
    }
    return;
  }

  if (msg.status === 200 && !registered) {
    registered = true;
    log('Registrado ✓', 'success');
    document.getElementById('callCard').style.display = 'block';
    document.getElementById('btnConnect').textContent = '🔄 Reconectar';
    document.getElementById('btnCall').disabled = false;
    return;
  }

  // --- INVITE responses ---
  if (callActive && msg.headers['cseq'] && msg.headers['cseq'].includes('INVITE')) {
    if (msg.status === 407) {
      // Auth needed for INVITE too
      const authHdr = msg.headers['proxy-authenticate'];
      if (authHdr) doAuthInvite(msg, authHdr);
      return;
    }
    if (msg.status === 180 || msg.status === 183) {
      log('Timbrando...');
      return;
    }
    if (msg.status === 200 && pc) {
      const sdp = msg.body;
      log('Conectado!', 'success');
      if (sdp) {
        pc.setRemoteDescription({ type: 'answer', sdp: sdp }).catch(e => log('SDP error: ' + e.message, 'error'));
      }
      // Send ACK
      const branch = makeBranch();
      const ack = createSipMessage('ACK', msg.headers['to'].match(/sip:[^\s;>]+/)[0], {
        'Via': 'SIP/2.0/TCP 0.0.0.0;branch=' + branch + ';rport',
        'From': msg.headers['from'],
        'To': msg.headers['to'],
        'Call-ID': msg.headers['call-id'],
        'CSeq': msg.headers['cseq'].replace('INVITE', 'ACK'),
        'Max-Forwards': '70',
      });
      sendSip(ack);
      document.getElementById('btnCall').disabled = true;
      document.getElementById('btnHangup').disabled = false;
      return;
    }
  }

  // --- BYE response ---
  if (msg.status === 200 && msg.headers['cseq'] && msg.headers['cseq'].includes('BYE')) {
    log('Llamada terminada', 'info');
    cleanupCall();
    return;
  }

  // --- Errors ---
  if (msg.status >= 300 && msg.status !== 407) {
    log('Error: ' + msg.status + ' ' + msg.reason, 'error');
    cleanupCall();
  }
}

function doAuthInvite(rs, authHeader) {
  const user = getVal('sipUser');
  const pass = getVal('sipPass');
  const domain = getVal('sipDomain');
  const number = getVal('destNum');
  const toUri = 'sip:' + number + '@' + domain;
  const fromUri = 'sip:' + user + '@' + domain;
  const challenge = parseAuthHeader(authHeader);
  const realm = challenge.realm || domain;
  const nonce = challenge.nonce || '';

  // Compute digest for INVITE
  const resp = digestResponse('INVITE', toUri, user, realm, pass, nonce);

  // Use the same call-id and increment CSeq
  const branch = makeBranch();
  const cseqMatch = rs.headers['cseq'] ? rs.headers['cseq'].match(/\d+/) : null;
  const cseq = cseqMatch ? parseInt(cseqMatch[0], 10) + 1 : 2;

  const sdpOffer = pc ? pc.localDescription.sdp : '';

  let headers = {
    'Via': 'SIP/2.0/TCP 0.0.0.0;branch=' + branch + ';rport',
    'From': '<' + fromUri + '>;tag=' + currentFromTag,
    'To': '<' + toUri + '>',
    'Call-ID': currentCallId,
    'CSeq': cseq + ' INVITE',
    'Contact': '<' + fromUri + '>',
    'Content-Type': 'application/sdp',
    'Max-Forwards': '70',
    'Proxy-Authorization': 'Digest username="' + user + '", realm="' + realm + '", nonce="' + nonce + '", uri="' + toUri + '", response="' + resp + '"',
  };

  sendSip(createSipMessage('INVITE', toUri, headers, sdpOffer));
}

// ---- WebRTC ----
async function startWebRTC(number) {
  try {
    const domain = getVal('sipDomain');
    const user = getVal('sipUser');
    const fromUri = 'sip:' + user + '@' + domain;
    const toUri = 'sip:' + number + '@' + domain;

    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    log('Micrófono activado ✓');

    pc = new RTCPeerConnection({ iceServers: [] });
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    pc.ontrack = (ev) => {
      log('Audio remoto recibido');
      const audio = new Audio();
      audio.srcObject = ev.streams[0];
      audio.play().catch(e => log('Play error: ' + e.message, 'error'));
    };

    pc.oniceconnectionstatechange = () => {
      log('ICE: ' + pc.iceConnectionState);
      if (pc.iceConnectionState === 'failed' || pc.iceConnectionState === 'disconnected') {
        log('Conexión de audio perdida', 'error');
      }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    // Wait for ICE gathering to complete
    if (pc.iceGatheringState !== 'complete') {
      await new Promise((resolve) => {
        pc.onicegatheringstatechange = () => {
          if (pc.iceGatheringState === 'complete') resolve();
        };
      });
    }

    log('SDP offer generado');

    currentCallId = makeCallId();
    currentFromTag = makeTag();
    callActive = true;

    const sdpOffer = pc.localDescription.sdp;
    const branch = makeBranch();

    const headers = {
      'Via': 'SIP/2.0/TCP 0.0.0.0;branch=' + branch + ';rport',
      'From': '<' + fromUri + '>;tag=' + currentFromTag,
      'To': '<' + toUri + '>',
      'Call-ID': currentCallId,
      'CSeq': '1 INVITE',
      'Contact': '<' + fromUri + '>',
      'Content-Type': 'application/sdp',
      'Max-Forwards': '70',
    };

    sendSip(createSipMessage('INVITE', toUri, headers, sdpOffer));
  } catch (e) {
    log('Error WebRTC: ' + e.message, 'error');
    cleanupCall();
  }
}

function cleanupCall() {
  callActive = false;
  if (pc) { pc.close(); pc = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  document.getElementById('btnCall').disabled = !registered;
  document.getElementById('btnHangup').disabled = true;
}

// ---- UI handlers ----
function connect() {
  const url = getVal('wsUrl');
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.close();
  }
  log('Conectando a ' + url + '...');
  ws = new WebSocket(url);

  ws.onopen = () => {
    log('WebSocket conectado ✓', 'success');
    doRegister();
  };

  ws.onmessage = (ev) => {
    const raw = typeof ev.data === 'string' ? ev.data : awaitData(ev.data);
    handleSipResponse(raw);
  };

  ws.onclose = () => {
    log('WebSocket desconectado', 'error');
    registered = false;
    cleanupCall();
    document.getElementById('callCard').style.display = 'none';
    document.getElementById('btnConnect').textContent = 'Conectar';
  };

  ws.onerror = (e) => {
    log('Error WebSocket', 'error');
  };
}

function makeCall() {
  const number = getVal('destNum');
  if (!number) { log('Ingresa un número', 'error'); return; }
  if (callActive) { log('Ya hay una llamada activa', 'error'); return; }
  log('Llamando a ' + number + '...');
  startWebRTC(number);
}

async function hangup() {
  if (!callActive) return;
  const domain = getVal('sipDomain');
  const user = getVal('sipUser');
  const fromUri = 'sip:' + user + '@' + domain;
  const number = getVal('destNum');
  const toUri = 'sip:' + number + '@' + domain;
  const branch = makeBranch();
  const cseq = (dialog.invCseq || 2) + 1;

  const headers = {
    'Via': 'SIP/2.0/TCP 0.0.0.0;branch=' + branch + ';rport',
    'From': '<' + fromUri + '>;tag=' + currentFromTag,
    'To': '<' + toUri + '>',
    'Call-ID': currentCallId,
    'CSeq': cseq + ' BYE',
    'Max-Forwards': '70',
  };

  sendSip(createSipMessage('BYE', toUri, headers));
  log('Colgando...');
}

// Polyfill for async buffer reading
async function awaitData(data) {
  if (data instanceof Blob) {
    return await data.text();
  }
  return data;
}

log('Página cargada. Presiona "Conectar" para iniciar.', 'info');
</script>
</body>
</html>
