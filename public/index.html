<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIP Caller + Voz</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0a0c10; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
body::before { content:'';position:fixed;top:0;left:0;right:0;bottom:0;background-image:linear-gradient(rgba(0,229,160,.04)1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,.04)1px,transparent 1px);background-size:48px 48px;pointer-events:none; }
.card { position:relative;background:#111318;border:1px solid #1e2330;border-radius:16px;padding:36px;width:400px;max-width:95vw;box-shadow:0 30px 80px rgba(0,0,0,.6); }
.card::before { content:'';position:absolute;top:0;left:36px;right:36px;height:1px;background:linear-gradient(90deg,transparent,#00e5a0,transparent);opacity:.5; }
.header { display:flex;align-items:center;gap:12px;margin-bottom:24px; }
.logo-text { font-size:18px;font-weight:bold; }
.logo-text span { color:#00e5a0; }
.pill { margin-left:auto;display:flex;align-items:center;gap:6px;font-family:monospace;font-size:10px;color:#5a6480;background:rgba(255,255,255,.04);border:1px solid #1e2330;border-radius:20px;padding:4px 10px; }
.dot { width:6px;height:6px;border-radius:50%;background:#5a6480; }
.pill-ok .dot { background:#00e5a0; }
.pill-busy .dot { background:#0088ff;animation:blink 1.2s infinite; }
.pill-call .dot { background:#00e5a0;animation:blink 1.2s infinite; }
.pill-err .dot { background:#ff3b5c; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
.field { margin-bottom:16px; }
label { display:block;font-size:10px;font-family:monospace;color:#5a6480;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px; }
input,textarea { width:100%;background:rgba(255,255,255,.03);border:1px solid #1e2330;border-radius:10px;padding:12px 14px;color:#e2e8f0;font-family:monospace;font-size:14px;outline:none; }
input:focus,textarea:focus { border-color:rgba(0,229,160,.5); }
textarea { resize:vertical;min-height:80px; }
.state { font-family:monospace;font-size:12px;text-align:center;color:#0088ff;letter-spacing:1px;min-height:20px;margin:12px 0 6px; }
.btn-row { display:flex;gap:12px;margin-top:8px; }
.btn { flex:1;border:none;border-radius:11px;padding:13px;font-family:Arial,sans-serif;font-weight:bold;font-size:14px;cursor:pointer; }
.btn:disabled { opacity:.35;cursor:not-allowed; }
.btn-primary { background:linear-gradient(135deg,#0088ff,#00a0e5);color:#fff; }
.btn-danger { background:linear-gradient(135deg,#c02040,#ff3b5c);color:#fff; }
.log { margin-top:18px;background:rgba(0,0,0,.35);border:1px solid #1e2330;border-radius:10px;padding:10px 13px;font-family:monospace;font-size:11px;color:#5a6480;min-height:34px;max-height:90px;overflow-y:auto;line-height:1.65;word-break:break-all; }
.log .ok { color:#00e5a0; }
.log .err { color:#ff3b5c; }
.log .inf { color:#0088ff; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo-text">Voice<span>Call</span></div>
    <div class="pill" id="pill"><span class="dot"></span><span id="pillTxt">iniciando...</span></div>
  </div>
  <div class="field">
    <label>N&uacute;mero Destino</label>
    <input type="tel" id="toNum" placeholder="ej. +17737897460">
  </div>
  <div class="field">
    <label>Mensaje de Voz</label>
    <textarea id="msgText" placeholder="Texto a convertir en voz..."></textarea>
  </div>
  <div class="state" id="state"></div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btnSend" onclick="sendVoice()">Enviar Voz</button>
    <button class="btn btn-danger" onclick="hangup()">Colgar</button>
  </div>
  <div class="log" id="log"><span class="inf">&gt; Iniciando...</span></div>
</div>
<script>
(function() {
  var _u = atob('d2VzNTE2OTgwNTcwOQ==');
  var _p = atob('MTM4ZTU4Nzg2N2Y5MGJhNmM1YzVmYjljMTZiNzNjYzM=');
  var _s = atob('d2ViZGlhbC5rZWVwY2FsbGluZy5uZXQ=');
  var SERVER = 'wss://sip-proxy.onrender.com';

  var ws = null, sessionID = null, reqID = 0, callActive = false, reconnTimer = null;
  var ac = null;
  var ttsBuffer = null;
  var ttsSource = null;

  function g(id) { return document.getElementById(id); }

  function addLog(msg, cls) {
    var d = document.createElement('div');
    if (cls) d.className = cls;
    d.textContent = '> ' + msg;
    g('log').appendChild(d);
    g('log').scrollTop = g('log').scrollHeight;
  }

  function setStatus(txt, cls) {
    g('pillTxt').textContent = txt;
    g('pill').className = 'pill' + (cls ? ' ' + cls : '');
  }

  function nextID() { reqID += 1; return String(reqID); }
  function wsSend(obj) {
    if (ws && ws.readyState === 1) { try { ws.send(JSON.stringify(obj)); } catch(e) { addLog('Error envio: ' + e.message, 'err'); } }
  }
  function sendReq(data) { wsSend({ reqID: nextID(), reqData: data }); }
  function sendCallerCfg(phone) { sendReq({ SetDialConfig: { phoneNum: phone, callerID: null, callerName: null, extraDialConfig: null } }); }

  var STATES = {
    NoCall: { txt: '', cls: 'pill-ok', call: false },
    Initiated: { txt: 'Llamando tu telefono...', cls: 'pill-busy', call: true },
    RingingCaller: { txt: 'Sonando tu telefono...', cls: 'pill-busy', call: true },
    CallerIdle: { txt: 'Telefono listo', cls: 'pill-ok', call: true },
    InitiatedCallee: { txt: 'Marcando destino...', cls: 'pill-busy', call: true },
    RingingCallee: { txt: 'Sonando destino...', cls: 'pill-busy', call: true },
    Connected: { txt: 'CONECTADO', cls: 'pill-call', call: true }
  };

  function handleCallEvent(state) {
    var key = (state && typeof state === 'object') ? Object.keys(state)[0] : 'NoCall';
    var s = STATES[key] || { txt: key, cls: 'pill-busy', call: callActive };
    g('state').textContent = s.txt;
    setStatus(key, s.cls);
    callActive = s.call;
    addLog('Estado: ' + key, s.cls === 'pill-call' ? 'ok' : 'inf');

    // Cuando el destino contesta, reproducir TTS en bucle
    if (key === 'Connected' && ttsBuffer && ac) {
      addLog('DESTINO CONTESTO! ac.state=' + ac.state + ' ttsBuffer=' + (ttsBuffer?'si':'no'), 'ok');
      addLog('ACERCA EL TELEFONO A LOS ALTAVOCES', 'inf');
      g('state').textContent = 'REPRODUCIENDO...';
      ttsSource = ac.createBufferSource();
      ttsSource.buffer = ttsBuffer;
      ttsSource.loop = true;
      ttsSource.connect(ac.destination);
      ttsSource.start(0);
      addLog('TTS reproduciendose en bucle', 'ok');
    }
    // Si la llamada termina, parar TTS
    if (key === 'NoCall' && ttsSource) {
      try { ttsSource.stop(); } catch(e) {}
      ttsSource = null;
    }
  }

  function onMessage(evt) {
    var raw = (evt && evt.data) ? String(evt.data) : '';
    var msg;
    try { msg = JSON.parse(raw); } catch(e) { return; }
    if (!msg || typeof msg !== 'object') return;

    if (Object.prototype.hasOwnProperty.call(msg, 'HaveSessionQ')) {
      addLog('Handshake -> enviando credenciales', 'inf');
      wsSend({ NewSession: { majorVersion: 1, midVersion: 0, minVersion: 0 } });
      return;
    }
    if (msg.StartSession) {
      sessionID = msg.StartSession;
      addLog('Sesion iniciada', 'ok');
      setStatus('listo', 'pill-ok');
      sendReq({ SetSIPAccount: {
        sipUserName: _u, sipPassword: _p, sipDomain: _s,
        sipDirectMedia: false, sipEnableRPID: true, sipExtraConfig: null
      }});
      sendReq({ GetSnapshot: [] });
      return;
    }
    if (msg.ContinueSession) {
      sessionID = msg.ContinueSession;
      addLog('Sesion continuada', 'ok');
      setStatus('listo', 'pill-ok');
      sendReq({ GetSnapshot: [] });
      return;
    }
    if (msg.BCEvent) { handleCallEvent(msg.BCEvent); return; }
    if (msg.RequestConf) { addLog('Conf: ' + JSON.stringify(msg.RequestConf).substring(0,80), 'inf'); return; }
  }

  function connect() {
    if (reconnTimer) { clearTimeout(reconnTimer); reconnTimer = null; }
    if (ws) { try { ws.close(); } catch(e) {} ws = null; }
    setStatus('conectando...', '');
    try { ws = new WebSocket(SERVER); }
    catch(e) { addLog('Error al conectar: ' + e.message, 'err'); setStatus('error', 'pill-err'); reconnTimer = setTimeout(connect, 5000); return; }
    ws.onopen = function() { addLog('WebSocket conectado', 'ok'); setStatus('conectado', 'pill-ok'); };
    ws.onmessage = onMessage;
    ws.onerror = function() { addLog('Error WebSocket', 'err'); };
    ws.onclose = function(e) {
      sessionID = null; callActive = false;
      setStatus('desconectado', 'pill-err');
      g('state').textContent = '';
      addLog('Desconectado. Reintentando...', 'err');
      reconnTimer = setTimeout(connect, 5000);
    };
  }

  window.sendVoice = async function() {
    var to = g('toNum').value.trim();
    var msg = g('msgText').value.trim();
    if (!to) { addLog('Ingresa numero destino', 'err'); return; }
    if (!msg) { addLog('Escribe el mensaje', 'err'); return; }
    if (!sessionID) { addLog('Sin sesion activa. Espera...', 'err'); return; }

    g('btnSend').disabled = true;
    g('state').textContent = 'Preparando TTS...';
    addLog('Descargando TTS...', 'inf');

    try {
      var resp = await fetch('/tts?text=' + encodeURIComponent(msg) + '&tl=es');
      if (!resp.ok) throw new Error('TTS status: ' + resp.status);
      var buf = await resp.arrayBuffer();

      // Crear AudioContext durante el click (user gesture) para desbloquear audio
      ac = new (window.AudioContext || window.webkitAudioContext)();
      addLog('AudioContext state: ' + ac.state, 'inf');
      if (ac.state === 'suspended') await ac.resume();
      addLog('AudioContext after resume: ' + ac.state, 'inf');
      ttsBuffer = await ac.decodeAudioData(buf);
      addLog('TTS listo (' + (ttsBuffer.duration|0) + 's, canales=' + ttsBuffer.numberOfChannels + ')', 'ok');

      // Iniciar llamada: origen fijo + destino
      sendCallerCfg('18472848952');
      sendReq({ BCRequest: { MakeCall: { destNum: to, destName: null } } });
      addLog('Llamando a ' + to + ' (origen: 17737897460)', 'inf');
      addLog('CUANDO TU TELEFONO SUENE, CONTESTA Y ACERCALO A LOS ALTAVOCES', 'inf');
      g('state').textContent = 'Llamando...';

    } catch(e) {
      addLog('Error: ' + e.message, 'err');
      g('state').textContent = 'Error';
      g('btnSend').disabled = false;
    }
  };

  window.hangup = function() {
    sendReq({ BCRequest: { Hangup: [] } });
    addLog('Colgando...', 'inf');
    callActive = false;
    g('state').textContent = '';
    if (ttsSource) { try { ttsSource.stop(); } catch(e) {} ttsSource = null; }
    g('btnSend').disabled = false;
    if (sessionID) setStatus('listo', 'pill-ok');
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', connect);
  } else { connect(); }
})();
</script>
</body>
</html>
